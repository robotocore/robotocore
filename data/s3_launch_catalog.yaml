catalog_version: 1
service: s3
inventory_methodology:
  source_of_record: "AWS What's New launch posts, normalized with current S3 documentation"
  notes:
    - "This baseline catalog focuses on launch families that map cleanly onto robotocore's current S3 surface."
    - "Each row is a canonical feature family; renamed or expanded launches should be folded into one row."
features:
  - feature_id: s3_event_notifications
    canonical_name: "Amazon S3 Event Notifications"
    launch_date: "2014-12-09"
    launch_url: "https://aws.amazon.com/about-aws/whats-new/2014/12/09/amazon-s3-event-notifications/"
    current_status: active
    replacement_feature_id:
    service_edges: ["s3->sqs", "s3->sns", "s3->lambda"]
    expected_semantics:
      - "Bucket notification configuration is persisted on the bucket."
      - "Object-created events fan out to configured targets."
      - "Prefix and suffix filters restrict deliveries to matching keys."
    aws_operations:
      - PutBucketNotificationConfiguration
      - GetBucketNotificationConfiguration
      - PutObject
    robotocore_components:
      - "src/robotocore/services/s3/provider.py"
      - "src/robotocore/services/s3/notifications.py"
    evidence_urls:
      - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/EventNotifications.html"
    evidence_files:
      - "src/robotocore/services/s3/notifications.py"
      - "tests/compatibility/test_s3_compat.py"
      - "tests/compatibility/test_cross_service_compat.py"
      - "tests/apps/event_chain/test_s3_triggers.py"
  - feature_id: s3_eventbridge_notifications
    canonical_name: "Amazon S3 Event Notifications to EventBridge"
    launch_date: "2021-11-29"
    launch_url: "https://aws.amazon.com/about-aws/whats-new/2021/11/amazon-s3-event-notifications-amazon-eventbridge/"
    current_status: active
    replacement_feature_id:
    service_edges: ["s3->eventbridge"]
    expected_semantics:
      - "Bucket notification configuration can enable EventBridge delivery."
      - "Object events are emitted as EventBridge events without direct SNS/SQS/Lambda targets."
    aws_operations:
      - PutBucketNotificationConfiguration
      - GetBucketNotificationConfiguration
    robotocore_components:
      - "src/robotocore/services/s3/notifications.py"
    evidence_urls:
      - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/EventBridge.html"
    evidence_files:
      - "src/robotocore/services/s3/notifications.py"
      - "tests/unit/services/s3/test_eventbridge_advanced.py"
  - feature_id: s3_lifecycle_configuration
    canonical_name: "Amazon S3 Lifecycle Configuration"
    launch_date: "2012-09-19"
    launch_url: "https://aws.amazon.com/about-aws/whats-new/2012/09/19/amazon-s3-introduces-lifecycle-management/"
    current_status: active
    replacement_feature_id:
    service_edges: []
    expected_semantics:
      - "Bucket lifecycle rules can be created, fetched, and removed."
      - "Lifecycle configuration survives subsequent object writes and reads."
