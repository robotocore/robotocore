AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SAM monitoring stack with SNS, CloudWatch alarm, and log group

Resources:
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-alarms"

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/sam/${AWS::StackName}/app"
      RetentionInDays: 7

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-errors"
      AlarmDescription: Alarm when error count exceeds threshold
      Namespace: !Sub "${AWS::StackName}/App"
      MetricName: ErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  TopicArn:
    Value: !Ref AlarmTopic
  LogGroupName:
    Value: !Ref AppLogGroup
  AlarmName:
    Value: !Ref ErrorAlarm
