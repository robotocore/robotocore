service: sls-cicd-pipeline
frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1

custom:
  localstack:
    endpoint: ${env:AWS_ENDPOINT_URL, 'http://localhost:4566'}

resources:
  Resources:
    ArtifactBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}-artifacts

    NotificationTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-notifications

    PipelineRole:
      Type: AWS::IAM::Role
      Properties:
        RoleName: ${self:service}-pipeline-role
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: codepipeline.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: PipelinePolicy
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObject
                    - sns:Publish
                  Resource: "*"

  Outputs:
    BucketName:
      Value: !Ref ArtifactBucket
    TopicArn:
      Value: !Ref NotificationTopic
    RoleArn:
      Value: !GetAtt PipelineRole.Arn

plugins:
  - serverless-localstack
