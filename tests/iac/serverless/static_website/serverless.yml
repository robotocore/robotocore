service: sls-static-website
frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.12
  region: us-east-1

custom:
  localstack:
    endpoint: ${env:AWS_ENDPOINT_URL, 'http://localhost:4566'}

resources:
  Resources:
    WebsiteBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${sls:stage}-site
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: error.html

  Outputs:
    BucketName:
      Value: !Ref WebsiteBucket
    BucketArn:
      Value: !GetAtt WebsiteBucket.Arn
    WebsiteURL:
      Value: !GetAtt WebsiteBucket.WebsiteURL

plugins:
  - serverless-localstack
