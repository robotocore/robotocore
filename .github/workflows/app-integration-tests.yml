name: App Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  app-tests:
    name: "Real-world app tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 uv run python -m robotocore.main &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
      - name: Run app integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
        run: uv run pytest tests/apps/ -v --tb=short
