name: App Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: app-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  app-tests:
    name: "App: ${{ matrix.app }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        app:
          - cicd_pipeline
          - content_mgmt
          - data_pipeline
          - ecommerce_order
          - event_chain
          - event_driven
          - file_processing
          - message_queue
          - multitenant_saas
          - notification_dispatch
          - scheduled_tasks
          - secrets_rotation
          - serverless_api
          - user_auth
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 HTTPS_DISABLED=1 DNS_DISABLED=1 \
            uv run python -m robotocore.main > .robotocore.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited early"
              cat .robotocore.log 2>/dev/null || true
              exit 1
            fi
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health || {
            echo "=== Server logs ==="
            cat .robotocore.log 2>/dev/null || true
            exit 1
          }
      - name: Run app integration tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_DEFAULT_REGION: us-east-1
        run: uv run pytest tests/apps/${{ matrix.app }}/ -v --tb=short --reruns=2 --reruns-delay=2 --junitxml=results-${{ matrix.app }}.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: results-app-${{ matrix.app }}
          path: results-${{ matrix.app }}.xml
      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-log-${{ matrix.app }}
          path: .robotocore.log
