name: IaC Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/iac/**"
      - "src/robotocore/**"
  pull_request:
    branches: [main]
    paths:
      - "tests/iac/**"
      - "src/robotocore/**"

concurrency:
  group: iac-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 uv run python -m robotocore.main > .robotocore.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health
      - name: Run Terraform IaC tests
        run: >
          ENDPOINT_URL=http://localhost:4566
          uv run pytest tests/iac/terraform/ -q --tb=short --junitxml=results-iac-terraform.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-iac-terraform
          path: results-iac-terraform.xml
      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-iac-terraform
          path: .robotocore.log

  cloudformation:
