name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # need tags for CalVer

      # Multi-arch Docker build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CalVer: YYYY.M.D, with .N suffix for same-day releases
      - name: Compute version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Manual tag push — use the tag as-is
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Auto-version from date
            BASE="$(date -u +%Y.%-m.%-d)"
            # Check for existing tags today
            EXISTING=$(git tag -l "v${BASE}" "v${BASE}.*" | wc -l | tr -d ' ')
            if [ "$EXISTING" -eq 0 ]; then
              VERSION="$BASE"
            else
              VERSION="${BASE}.${EXISTING}"
            fi
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      # Update __version__ in source before building
      - name: Set version in source
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ steps.version.outputs.VERSION }}\"/" \
            src/robotocore/__init__.py

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            robotocore/robotocore:${{ steps.version.outputs.VERSION }}
            robotocore/robotocore:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Tag the commit (only for auto-versioned main pushes)
      - name: Create git tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      # GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
