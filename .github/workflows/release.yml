name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-publish:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Multi-arch Docker build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # For tagged releases: versioned + latest tags
      # For main pushes: latest only
      - name: Determine tags
        id: tags
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "TAGS<<EOF" >> $GITHUB_OUTPUT
            echo "robotocore/robotocore:${VERSION}" >> $GITHUB_OUTPUT
            echo "robotocore/robotocore:latest" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}:${VERSION}" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "TAGS<<EOF" >> $GITHUB_OUTPUT
            echo "robotocore/robotocore:latest" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitHub Release (only for tagged versions)
      - name: Create GitHub Release
        if: steps.tags.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
