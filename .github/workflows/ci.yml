name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  prompt-log:
    name: Prompt log check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for prompt log entry
        run: |
          CODE=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD \
            | grep -E '^(src/|tests/|scripts/)' || true)
          PROMPTS=$(git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD \
            | grep '^prompts/' || true)
          if [ -z "$CODE" ]; then
            echo "✓ No source/test changes — prompt log not required."
            exit 0
          fi
          if [ -z "$PROMPTS" ]; then
            echo "✗ This PR changes source/tests but adds no prompt log."
            echo ""
            echo "  Add a file to prompts/YYYYMMDD-HHMMSS-<slug>.md documenting"
            echo "  the human prompts and key assistant decisions in this PR."
            echo "  See prompts/PROMPTLOG.md for format."
            exit 1
          fi
          echo "✓ Prompt log present: $PROMPTS"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: ruff
        run: |
          uv run ruff check src/ tests/ scripts/
          uv run ruff format --check src/ tests/ scripts/
      - name: mypy
        run: uv run mypy src/robotocore/ --ignore-missing-imports
      - name: bandit
        run: uv run bandit -r src/robotocore/ -ll -c pyproject.toml -q
      - name: dependency audit
        # CVE-2026-4539 affects pygments 2.19.2 (transitive via rich/pytest).
        # No fix version exists yet; ignore until pygments releases a patch.
        run: uvx pip-audit --ignore-vuln CVE-2026-4539

  test-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Check test quality (static analysis)
        run: >
          uv run python scripts/validate_test_quality.py
          --max-no-contact-pct 5
          --max-no-assertion-pct 6
          --max-weak-assertion-pct 25
      - name: Check empty except:pass blocks
        run: uv run python scripts/fix_empty_except.py --check
      - name: Check wire name correctness
        run: uv run python scripts/fix_moto_param_names.py --all
      - name: Check compat test sharding coverage
        run: uv run python scripts/check_compat_sharding.py
      - name: Audit fallthrough coverage (informational)
        run: uv run python scripts/audit_fallthrough.py --all --max-uncovered 400
      - name: Project structural lint
        run: uv run python scripts/lint_project.py --fail
      - name: Upload quality report
        if: always()
        run: uv run python scripts/validate_test_quality.py --json > test-quality.json
      - name: Upload structural lint report
        if: always()
        run: uv run python scripts/lint_project.py --json > lint-project.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-quality-report
          path: |
            test-quality.json
            lint-project.json

  # ── Unit test shards (run in parallel, on Python 3.12 + 3.13) ─────────────

  unit-gateway:
    name: "unit: gateway (${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: >
          uv run pytest
          tests/unit/gateway/
          tests/unit/protocols/
          tests/unit/providers/
          tests/unit/test_handler_chain_unit.py
          tests/unit/test_iam_middleware.py
          -n4 -q --tb=short
          --junitxml=results-unit-gateway-${{ matrix.python-version }}.xml
          --cov=src/robotocore --cov-report=xml:coverage-unit-gateway-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit-gateway-${{ matrix.python-version }}
          path: |
            results-unit-gateway-${{ matrix.python-version }}.xml
            coverage-unit-gateway-${{ matrix.python-version }}.xml

  unit-services:
    name: "unit: services (${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: >
          uv run pytest tests/unit/services/
          -n4 -q --tb=short
          --junitxml=results-unit-services-${{ matrix.python-version }}.xml
          --cov=src/robotocore --cov-report=xml:coverage-unit-services-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit-services-${{ matrix.python-version }}
          path: |
            results-unit-services-${{ matrix.python-version }}.xml
            coverage-unit-services-${{ matrix.python-version }}.xml

  unit-infra:
    name: "unit: infra (${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - name: Run infra unit tests
        run: >
          uv run pytest
          tests/unit/
          --ignore=tests/unit/gateway/
          --ignore=tests/unit/protocols/
          --ignore=tests/unit/providers/
          --ignore=tests/unit/services/
          --ignore=tests/unit/test_handler_chain_unit.py
          --ignore=tests/unit/test_iam_middleware.py
          -n4 -q --tb=short
          --junitxml=results-unit-infra-${{ matrix.python-version }}.xml
          --cov=src/robotocore --cov-report=xml:coverage-unit-infra-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit-infra-${{ matrix.python-version }}
          path: |
            results-unit-infra-${{ matrix.python-version }}.xml
            coverage-unit-infra-${{ matrix.python-version }}.xml

  # ── Integration + compatibility ────────────────────────────────────────────

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: >
          uv run pytest tests/integration/
          -v --tb=short
          --junitxml=results-integration.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration
          path: results-integration.xml

  compatibility-tests:
    name: "compat: ${{ matrix.shard }}"
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          # a-g: ~5200 tests (acm, batch, cloudwatch, dynamodb, ec2, ecs, events, glue, iam…)
          - shard: "a-g"
            pattern: "tests/compatibility/test_[a-g]*.py"
          # h-r: ~3800 tests (iam, kinesis, lambda, logs, opensearch, rds, route53, rekognition…)
          - shard: "h-r"
            pattern: "tests/compatibility/test_[h-r]*.py"
          # s-z: ~2700 tests (s3, scheduler, secretsmanager, ses, sns, sqs, ssm, stepfunctions…)
          - shard: "s-z"
            pattern: "tests/compatibility/test_[s-z]*.py"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 HTTPS_DISABLED=1 DNS_DISABLED=1 \
            uv run python -m robotocore.main > .robotocore.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited early"
              cat .robotocore.log 2>/dev/null || true
              exit 1
            fi
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health || {
            echo "=== Server logs ==="
            cat .robotocore.log 2>/dev/null || true
            exit 1
          }
      - name: Run per-service compatibility tests (${{ matrix.shard }})
        run: >
          ENDPOINT_URL=http://localhost:4566
          uv run pytest ${{ matrix.pattern }}
          --ignore=tests/compatibility/test_cross_service_compat.py
          -n8 --dist=loadfile -q --tb=short
          --junitxml=results-compat-${{ matrix.shard }}.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-compat-${{ matrix.shard }}
          path: results-compat-${{ matrix.shard }}.xml
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-compat-${{ matrix.shard }}
          path: .robotocore.log

  # Roll-up so the "compatibility-tests" branch protection rule resolves.
  # The matrix shards report as "compat: a-g" etc., not "compatibility-tests".
  compatibility-tests-rollup:
    name: compatibility-tests
    runs-on: ubuntu-latest
    if: always()
    needs: [compatibility-tests]
    steps:
      - run: |
          if [ "${{ needs.compatibility-tests.result }}" != "success" ]; then
            echo "One or more compat shards failed"
            exit 1
          fi

  cross-service-tests:
    name: "compat: cross-service integrations"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 HTTPS_DISABLED=1 DNS_DISABLED=1 \
            uv run python -m robotocore.main > .robotocore.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited early"
              cat .robotocore.log 2>/dev/null || true
              exit 1
            fi
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health || {
            echo "=== Server logs ==="
            cat .robotocore.log 2>/dev/null || true
            exit 1
          }
      - name: Run cross-service integration tests
        run: >
          ENDPOINT_URL=http://localhost:4566
          uv run pytest
          tests/compatibility/test_cross_service_compat.py
          tests/compatibility/chaos/test_chaos_engineering_compat.py
          -v --tb=short
          --junitxml=results-cross-service.xml
      - name: Validate test quality
        if: always()
        run: >
          uv run python scripts/validate_test_quality.py
          --file tests/compatibility/test_cross_service_compat.py
          --file tests/compatibility/chaos/test_chaos_engineering_compat.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-cross-service
          path: results-cross-service.xml
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-cross-service
          path: .robotocore.log

  shape-regression:
    name: "shape: response shape + error contract validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 HTTPS_DISABLED=1 DNS_DISABLED=1 \
            uv run python -m robotocore.main > .robotocore.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited early"
              cat .robotocore.log 2>/dev/null || true
              exit 1
            fi
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health || {
            echo "=== Server logs ==="
            cat .robotocore.log 2>/dev/null || true
            exit 1
          }
      - name: Validate response shapes (top 20 services)
        run: >
          PYTHONPATH=.
          uv run python scripts/validate_response_shapes.py
          --top 20 --no-optional
      - name: Validate error contracts (top 20 services)
        run: >
          PYTHONPATH=.
          uv run python scripts/validate_error_contracts.py
          --top 20
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-shape-regression
          path: .robotocore.log

  iac-tests:
    name: "iac: CloudFormation + SAM + Serverless"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --all-extras
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 HTTPS_DISABLED=1 DNS_DISABLED=1 \
            uv run python -m robotocore.main > .robotocore.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 60); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process exited early"
              cat .robotocore.log 2>/dev/null || true
              exit 1
            fi
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health || {
            echo "=== Server logs ==="
            cat .robotocore.log 2>/dev/null || true
            exit 1
          }
      - name: Run IaC tests (CFN, SAM, Serverless)
        run: >
          ENDPOINT_URL=http://localhost:4566
          uv run pytest
          tests/iac/cloudformation/
          tests/iac/sam/
          tests/iac/serverless/
          -v --tb=short
          --reruns=2 --reruns-delay=1
          --junitxml=results-iac.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-iac
          path: results-iac.xml
      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs-iac
          path: .robotocore.log

  # ── Docker + final gates ───────────────────────────────────────────────────

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-quality
      - unit-gateway
      - unit-services
      - unit-infra
      - integration-tests
      - compatibility-tests
      - cross-service-tests
      - iac-tests
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build Docker image
        run: docker build -t robotocore:test .
      - name: Smoke test
        run: |
          docker run -d -p 4566:4566 --name robotocore-test robotocore:test
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_robotocore/health && break
            sleep 1
          done
          curl -f http://localhost:4566/_robotocore/health
          # Basic S3 operations
          pip install --upgrade boto3 --quiet
          python -c "
          import boto3
          s3 = boto3.client('s3', endpoint_url='http://localhost:4566',
              aws_access_key_id='test', aws_secret_access_key='test',
              region_name='us-east-1')
          s3.create_bucket(Bucket='test-bucket')
          s3.put_object(Bucket='test-bucket', Key='test.txt', Body=b'hello')
          obj = s3.get_object(Bucket='test-bucket', Key='test.txt')
          assert obj['Body'].read() == b'hello'
          print('S3 smoke test passed')
          "
          # Basic SQS
          python -c "
          import boto3, time
          sqs = boto3.client('sqs', endpoint_url='http://localhost:4566',
              aws_access_key_id='test', aws_secret_access_key='test',
              region_name='us-east-1')
          q = sqs.create_queue(QueueName='test-queue')
          url = q['QueueUrl']
          print('Queue URL:', url)
          sqs.send_message(QueueUrl=url, MessageBody='hello')
          time.sleep(1)
          msgs = []
          for i in range(10):
              resp = sqs.receive_message(QueueUrl=url, MaxNumberOfMessages=10, VisibilityTimeout=0)
              msgs = resp.get('Messages', [])
              print(f'Attempt {i+1}: got {len(msgs)} messages')
              if msgs:
                  break
              time.sleep(1)
          assert msgs and msgs[0]['Body'] == 'hello', f'Expected message, got: {msgs}'
          print('SQS smoke test passed')
          "
          echo "All smoke tests passed"
      - name: Check image size
        run: |
          SIZE=$(docker image inspect robotocore:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "WARNING: Image exceeds 500MB target (${SIZE_MB}MB)"
          fi
      - name: Container security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: robotocore:test
          format: table
          exit-code: 0  # Non-blocking
          severity: CRITICAL,HIGH
      - name: Stop container
        if: always()
        run: docker rm -f robotocore-test || true

  parity-report:
    runs-on: ubuntu-latest
    needs: [compatibility-tests, cross-service-tests]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Generate parity report
        run: >
          uv run python scripts/generate_parity_report.py
          --output parity-report.json
      - name: Upload parity report
        uses: actions/upload-artifact@v7
        with:
          name: parity-report
          path: parity-report.json

  # ── Aggregate results ─────────────────────────────────────────────────────

  test-summary:
    name: "Test summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - unit-gateway
      - unit-services
      - unit-infra
      - integration-tests
      - compatibility-tests
      - cross-service-tests
      - iac-tests
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true
          path: test-results/
      - name: Test results summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          total_tests=0
          total_failures=0
          total_errors=0
          total_skipped=0
          for f in test-results/*.xml; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .xml | sed 's/^results-//')
            tests=$(grep -o 'tests="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*' || echo 0)
            failures=$(grep -o 'failures="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*' || echo 0)
            errors=$(grep -o 'errors="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*' || echo 0)
            skipped=$(grep -o 'skipped="[0-9]*"' "$f" | head -1 | grep -o '[0-9]*' || echo 0)
            time=$(grep -o 'time="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*' || echo 0)
            total_tests=$((total_tests + tests))
            total_failures=$((total_failures + failures))
            total_errors=$((total_errors + errors))
            total_skipped=$((total_skipped + skipped))
            status="✅"
            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then status="❌"; fi
            echo "| ${status} ${name} | ${tests} | ${failures} | ${errors} | ${skipped} | ${time}s |" >> results.md
          done
          echo "| Suite | Tests | Failures | Errors | Skipped | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|----------|--------|---------|------|" >> $GITHUB_STEP_SUMMARY
          cat results.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total: ${total_tests} tests, ${total_failures} failures, ${total_errors} errors, ${total_skipped} skipped**" >> $GITHUB_STEP_SUMMARY
          if [ "$total_failures" -gt 0 ] || [ "$total_errors" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Some tests failed. Check individual job logs for details." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Coverage summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in test-results/coverage-*.xml; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .xml | sed 's/^coverage-//')
            rate=$(grep -o 'line-rate="[0-9.]*"' "$f" | head -1 | grep -o '[0-9.]*' || echo 0)
            pct=$(echo "$rate * 100" | bc -l 2>/dev/null | head -c5 || echo "?")
            echo "- **${name}**: ${pct}%" >> $GITHUB_STEP_SUMMARY
          done
