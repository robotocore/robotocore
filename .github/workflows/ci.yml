name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ tests/ scripts/
      - run: uv run ruff format --check src/ tests/ scripts/

  test-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Check test quality (static analysis)
        run: >
          uv run python scripts/validate_test_quality.py
          --max-no-contact-pct 5
          --max-no-assertion-pct 6
      - name: Project structural lint
        run: uv run python scripts/lint_project.py --fail
      - name: Upload quality report
        if: always()
        run: uv run python scripts/validate_test_quality.py --json > test-quality.json
      - name: Upload structural lint report
        if: always()
        run: uv run python scripts/lint_project.py --json > lint-project.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-quality-report
          path: |
            test-quality.json
            lint-project.json

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run mypy src/robotocore/ --ignore-missing-imports
        continue-on-error: true  # Non-blocking during transition

  # ── Unit test shards (run in parallel) ─────────────────────────────────────

  unit-gateway:
    name: "unit: gateway + protocols + providers"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: >
          uv run pytest
          tests/unit/gateway/
          tests/unit/protocols/
          tests/unit/providers/
          tests/unit/test_handler_chain_unit.py
          tests/unit/test_iam_middleware.py
          tests/unit/test_moto_patches.py
          -n4 -q --tb=short

  unit-services:
    name: "unit: service providers"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit/services/ -n4 -q --tb=short

  unit-infra:
    name: "unit: infra (chaos, audit, state, extensions, observability)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: >
          uv run pytest
          tests/unit/observability/
          tests/unit/test_fault_rules.py
          tests/unit/test_chaos_middleware.py
          tests/unit/test_audit_log.py
          tests/unit/test_audit_log_unit.py
          tests/unit/test_chaos.py
          tests/unit/test_extensions.py
          tests/unit/test_extensions_unit.py
          tests/unit/test_state_manager.py
          tests/unit/test_state_persistence.py
          tests/unit/test_state_snapshots.py
          tests/unit/test_state_manager_unit.py
          tests/unit/test_resource_browser.py
          tests/unit/test_main.py
          -n4 -q --tb=short

  # ── Integration + compatibility ────────────────────────────────────────────

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run pytest tests/integration/ -v --tb=short

  compatibility-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Start robotocore
        run: |
          ROBOTOCORE_PORT=4566 uv run python -m robotocore.main &
          sleep 3
          curl -f http://localhost:4566/_robotocore/health
      - name: Run compatibility tests
        run: >
          ENDPOINT_URL=http://localhost:4566
          uv run pytest tests/compatibility/
          -n4 --dist=loadfile -q --tb=short

  # ── Security ───────────────────────────────────────────────────────────────

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Python security scan (bandit)
        run: |
          uv pip install bandit
          uv run bandit -r src/robotocore/ -ll -q || true
      - name: Dependency audit
        run: uv pip audit || true

  # ── Docker + final gates ───────────────────────────────────────────────────

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-quality
      - unit-gateway
      - unit-services
      - unit-infra
      - integration-tests
      - compatibility-tests
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build Docker image
        run: docker build -t robotocore:test .
      - name: Smoke test
        run: |
          docker run -d -p 4566:4566 --name robotocore-test robotocore:test
          sleep 5
          # Health check
          curl -f http://localhost:4566/_robotocore/health
          # Basic S3 operations
          pip install boto3
          python -c "
          import boto3
          s3 = boto3.client('s3', endpoint_url='http://localhost:4566',
              aws_access_key_id='test', aws_secret_access_key='test',
              region_name='us-east-1')
          s3.create_bucket(Bucket='test-bucket')
          s3.put_object(Bucket='test-bucket', Key='test.txt', Body=b'hello')
          obj = s3.get_object(Bucket='test-bucket', Key='test.txt')
          assert obj['Body'].read() == b'hello'
          print('S3 smoke test passed')
          "
          # Basic SQS
          python -c "
          import boto3, time
          sqs = boto3.client('sqs', endpoint_url='http://localhost:4566',
              aws_access_key_id='test', aws_secret_access_key='test',
              region_name='us-east-1')
          q = sqs.create_queue(QueueName='test-queue')
          sqs.send_message(QueueUrl=q['QueueUrl'], MessageBody='hello')
          msgs = []
          for _ in range(5):
              resp = sqs.receive_message(QueueUrl=q['QueueUrl'], WaitTimeSeconds=1)
              msgs = resp.get('Messages', [])
              if msgs:
                  break
              time.sleep(0.5)
          assert msgs and msgs[0]['Body'] == 'hello', f'Expected message, got: {msgs}'
          print('SQS smoke test passed')
          "
          echo "All smoke tests passed"
      - name: Check image size
        run: |
          SIZE=$(docker image inspect robotocore:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 500 ]; then
            echo "WARNING: Image exceeds 500MB target (${SIZE_MB}MB)"
          fi
      - name: Container security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: robotocore:test
          format: table
          exit-code: 0  # Non-blocking
          severity: CRITICAL,HIGH
      - name: Stop container
        if: always()
        run: docker rm -f robotocore-test || true

  parity-report:
    runs-on: ubuntu-latest
    needs: [compatibility-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Generate parity report
        run: >
          uv run python scripts/generate_parity_report.py
          --output parity-report.json
      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-report
          path: parity-report.json
