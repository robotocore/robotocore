[project]
name = "robotocore"
version = "0.1.0"
description = "Free, open-source AWS emulator with LocalStack parity, built on Moto"
license = "MIT"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "Jack Danger", email = "github@jackcanfield.com" },
]
keywords = ["aws", "mock", "localstack", "moto", "testing", "emulator"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]

dependencies = [
    "moto[all]>=5.0",
    "uvicorn>=0.30",
    "starlette>=0.38",
    "httpx>=0.27",
    "botocore>=1.34",
    "boto3>=1.34",
    "xmltodict>=0.13",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-xdist>=3.5",
    "ruff>=0.5",
    "mypy>=1.10",
    "coverage>=7.5",
    "httpx>=0.27",
]

[project.scripts]
robotocore = "robotocore.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/robotocore"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
