<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="200" rx="16" fill="url(#bg)"/>
  <!-- Animated circuit lines -->
  <g opacity="0.15">
    <line x1="0" y1="50" x2="600" y2="50" stroke="#06b6d4" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="100" x2="600" y2="100" stroke="#8b5cf6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="150" x2="600" y2="150" stroke="#06b6d4" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="150" y1="0" x2="150" y2="200" stroke="#8b5cf6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#06b6d4" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3.2s" repeatCount="indefinite"/>
    </line>
    <line x1="450" y1="0" x2="450" y2="200" stroke="#8b5cf6" stroke-width="0.5">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="2.8s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Animated dots at intersections -->
  <g>
    <circle cx="150" cy="50" r="3" fill="#06b6d4">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="100" r="3" fill="#8b5cf6">
      <animate attributeName="r" values="2;4;2" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="150" r="3" fill="#06b6d4">
      <animate attributeName="r" values="2;4;2" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="50" r="3" fill="#8b5cf6">
      <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="150" r="3" fill="#06b6d4">
      <animate attributeName="r" values="2;4;2" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Robot icon -->
  <g transform="translate(80, 60)">
    <!-- Head -->
    <rect x="0" y="10" width="40" height="32" rx="6" fill="none" stroke="#06b6d4" stroke-width="2">
      <animate attributeName="stroke" values="#06b6d4;#8b5cf6;#06b6d4" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Antenna -->
    <line x1="20" y1="10" x2="20" y2="0" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="20" cy="0" r="3" fill="#06b6d4">
      <animate attributeName="fill" values="#06b6d4;#f59e0b;#06b6d4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Eyes -->
    <circle cx="13" cy="26" r="4" fill="#06b6d4">
      <animate attributeName="fill" values="#06b6d4;#22d3ee;#06b6d4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="27" cy="26" r="4" fill="#06b6d4">
      <animate attributeName="fill" values="#06b6d4;#22d3ee;#06b6d4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Mouth -->
    <rect x="10" y="34" width="20" height="2" rx="1" fill="#06b6d4" opacity="0.7"/>
    <!-- Body -->
    <rect x="5" y="46" width="30" height="24" rx="4" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <!-- Arms -->
    <line x1="0" y1="50" x2="-8" y2="60" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="50" x2="48" y2="60" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="170" y="90" font-family="monospace, Consolas, 'Courier New'" font-size="42" font-weight="bold" fill="white" letter-spacing="-1">
    robotocore
  </text>
  <!-- Animated underline -->
  <rect x="170" y="100" width="0" height="3" rx="1.5" fill="url(#glow)">
    <animate attributeName="width" values="0;280;280" dur="1.5s" fill="freeze"/>
  </rect>
  <!-- Subtitle -->
  <text x="170" y="128" font-family="monospace, Consolas, 'Courier New'" font-size="14" fill="#94a3b8">
    free &amp; open-source AWS emulator
  </text>
  <!-- Stats badges -->
  <g transform="translate(170, 145)">
    <rect x="0" y="0" width="90" height="22" rx="4" fill="#06b6d4" opacity="0.2"/>
    <text x="45" y="15" font-family="monospace" font-size="11" fill="#06b6d4" text-anchor="middle">35 services</text>
    <rect x="100" y="0" width="80" height="22" rx="4" fill="#8b5cf6" opacity="0.2"/>
    <text x="140" y="15" font-family="monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">342 tests</text>
    <rect x="190" y="0" width="60" height="22" rx="4" fill="#10b981" opacity="0.2"/>
    <text x="220" y="15" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">MIT</text>
  </g>
  <!-- Animated pulse ring around robot -->
  <circle cx="100" cy="90" r="50" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="40;65;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
